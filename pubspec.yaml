name: workflow_ia_mobile
description: "Workflow IA Mobile — app Flutter para funcionarios y administradores."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & storage
  http: ^1.2.1
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^14.3.0

  # State management
  provider: ^6.1.2

  # Media / evidence upload
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Utils
  intl: ^0.19.0
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
